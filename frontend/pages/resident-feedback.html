<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <div class="dashboard">
        <div class="dashboard-header">
            <h1>Send Feedback</h1>
            <p>Share comments or suggestions to help improve WasteSense.</p>
        </div>

        <nav class="nav-menu">
            <ul>
                <li><a href="dashboard-resident.html">← Back to Dashboard</a></li>
                <li><a href="my-submissions.html">My Submissions</a></li>
                <li><a href="submit-waste.html">Submit Waste</a></li>
            </ul>
        </nav>

        <div class="content-section">
            <h2>Feedback Form</h2>
            <div id="alert-container"></div>
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="feedbackMessage">Message</label>
                    <textarea id="feedbackMessage" rows="6" placeholder="Write your feedback here..." required></textarea>
                    <small style="color:#6c757d;">Max 2000 characters.</small>
                </div>
                <button type="submit" class="btn">Submit Feedback</button>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user) {
                window.location.href = '/pages/login.html';
                return;
            }

            if (user.role !== 'resident' && user.role !== 'admin') {
                alert('Access denied. Residents only.');
                window.location.href = '/pages/login.html';
                return;
            }

            document.getElementById('feedbackForm').addEventListener('submit', submitFeedback);
        });

        async function submitFeedback(e) {
            e.preventDefault();
            const message = document.getElementById('feedbackMessage').value.trim();
            if (!message) {
                showAlert('Please enter your feedback message.', 'error');
                return;
            }
            if (message.length > 2000) {
                showAlert('Message is too long (max 2000 characters).', 'error');
                return;
            }

            try {
                const resp = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ message })
                });
                const data = await resp.json();

                if (resp.ok && data.status === 'success') {
                    showAlert('Thank you! Your feedback was submitted.', 'success');
                    document.getElementById('feedbackForm').reset();
                } else {
                    showAlert(data.message || 'Failed to submit feedback.', 'error');
                }
            } catch (err) {
                console.error(err);
                showAlert('An error occurred while submitting feedback.', 'error');
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            if (!alertContainer) return;
            alertContainer.innerHTML = `<div class="alert alert-${type}">${escapeHtml(message)}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }
    </script>
</body>
</html>
