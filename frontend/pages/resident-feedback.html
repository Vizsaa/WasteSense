<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .feedback-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .feedback-hero {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .feedback-hero .mascot {
            flex-shrink: 0;
            width: 120px;
        }

        @media (max-width: 640px) {
            .feedback-hero {
                flex-direction: column;
                text-align: center;
                gap: var(--space-2);
            }
        }

        .char-counter {
            text-align: right;
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>

<body class="stagger-1">

    <div class="main-content">
        <div class="feedback-container">
            <div class="feedback-hero">
                <img src="../assets/mascot3.png" alt="Helpful Mascot" class="mascot">
                <div>
                    <h1 style="margin-bottom:var(--space-2);">Send Feedback</h1>
                    <p class="text-secondary" style="font-size:var(--text-md); margin:0;">
                        Share your comments, suggestions, or report issues to help improve WasteSense.
                    </p>
                </div>
            </div>

            <div class="nm-raised custom-radius" style="padding:var(--space-6);">
                <form id="feedbackForm">
                    <div class="form-group mb-4">
                        <label for="feedbackMessage" class="d-flex justify-content-between align-items-center">
                            <span>Your Message</span>
                        </label>
                        <textarea id="feedbackMessage" name="message" class="nm-inset" rows="6" maxlength="2000"
                            placeholder="Write your feedback here..." required></textarea>
                        <div class="char-counter"><span id="charCount">0</span> / 2000</div>
                    </div>

                    <button type="submit" class="btn gradient-brand w-100" id="submitBtn">Send Feedback →</button>

                    <div id="successState" style="display:none; text-align:center; padding:var(--space-4) 0;">
                        <div style="font-size:3rem; margin-bottom:var(--space-2);">💚</div>
                        <h3 style="margin-bottom:var(--space-2);">Thank You!</h3>
                        <p class="text-secondary mb-4">Your feedback has been received and will be reviewed by our team.
                        </p>
                        <button type="button" class="btn btn-ghost" onclick="resetForm()">Send Another</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user || (user.role !== 'resident' && user.role !== 'admin')) {
                window.location.href = 'login.html'; return;
            }

            const textarea = document.getElementById('feedbackMessage');
            const counter = document.getElementById('charCount');

            textarea.addEventListener('input', () => {
                counter.textContent = textarea.value.length;
            });

            document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const msg = textarea.value.trim();
                if (!msg) { showToast('Please enter a message', 'warning'); return; }

                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.textContent = 'Sending...';

                try {
                    const res = await apiFetch('/api/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: msg })
                    });

                    if (res.status === 'success') {
                        // Hide form elements, show success
                        textarea.parentElement.style.display = 'none';
                        btn.style.display = 'none';
                        document.getElementById('successState').style.display = 'block';
                    }
                } catch (e) {
                    btn.disabled = false;
                    btn.textContent = 'Send Feedback →';
                }
            });
        });

        window.resetForm = function () {
            const textarea = document.getElementById('feedbackMessage');
            textarea.value = '';
            document.getElementById('charCount').textContent = '0';

            textarea.parentElement.style.display = 'block';
            const btn = document.getElementById('submitBtn');
            btn.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Send Feedback →';

            document.getElementById('successState').style.display = 'none';
        }
    </script>
</body>

</html>
