<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Map - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <style>
        /* Map Layout Overrides */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .map-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #masterMap {
            flex: 1;
            height: 100%;
            z-index: 1;
            background: var(--bg-surface);
        }

        /* Side Panel (Desktop) / Bottom Sheet (Mobile) */
        .list-panel {
            width: 400px;
            background: var(--bg-base);
            height: 100%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .panel-header {
            padding: var(--space-4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: var(--bg-surface);
            z-index: 2;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-4);
            background: var(--bg-base);
        }

        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .map-wrapper {
                flex-direction: column;
            }

            #masterMap {
                height: 50vh;
                flex: 0 0 50vh;
            }

            .list-panel {
                width: 100%;
                height: 50vh;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        /* Filter Pills */
        .filter-scroll {
            display: flex;
            gap: var(--space-2);
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: var(--space-2);
        }

        .filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .pill {
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            background: var(--bg-inset);
            color: var(--text-secondary);
            font-size: var(--text-xs);
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .pill.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--brand-emerald);
            border-color: var(--brand-emerald);
        }

        /* Map Card Item */
        .map-list-card {
            background: var(--bg-raised);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            margin-bottom: var(--space-3);
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-list-card:hover {
            background: var(--bg-surface);
        }

        .map-list-card.selected {
            border-left-color: var(--brand-emerald);
            background: rgba(16, 185, 129, 0.05);
        }

        /* Leaflet Popup Dark Mode */
        .leaflet-popup-content-wrapper {
            background: var(--bg-raised);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-raised);
        }

        .leaflet-popup-tip {
            background: var(--bg-raised);
        }

        .leaflet-container a.leaflet-popup-close-button {
            color: var(--text-muted);
        }

        .leaflet-popup-content {
            margin: 16px;
            line-height: 1.4;
        }

        /* Floating Back Btn */
        .floating-back {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--bg-raised);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: var(--radius-pill);
            text-decoration: none;
            font-weight: 600;
            font-size: var(--text-sm);
            box-shadow: var(--shadow-raised);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .floating-back:hover {
            background: var(--bg-surface);
            color: var(--brand-emerald);
        }
    </style>
</head>

<body>

    <div class="map-wrapper stager-1">
        <!-- Floating Nav -->
        <a href="dashboard-collector.html" class="floating-back">← Dashboard</a>

        <!-- Map Area -->
        <div id="masterMap"></div>

        <!-- List/Filter Panel -->
        <div class="list-panel">
            <div class="panel-header">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 style="font-size:var(--text-lg); margin:0;" id="masterMapTitle">Active Zones</h2>
                    <span class="badge badge-scheduled" id="counterBadge">0 Stops</span>
                </div>

                <div class="filter-scroll" id="statusFilters">
                    <div class="pill active" data-filter="all">All Modes</div>
                    <div class="pill" data-filter="pending">New Requests</div>
                    <div class="pill" data-filter="scheduled">My Pickups</div>
                </div>

                <div class="d-flex align-items-center justify-content-between mt-2 mb-2">
                    <div style="font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">
                        Category Filter</div>
                </div>
                <!-- Category Filter Pills -->
                <div class="filter-scroll" id="categoryFilters">
                    <div class="pill active" data-cat="all">All</div>
                    <div class="pill" data-cat="biodegradable">Bio</div>
                    <div class="pill" data-cat="recyclable">Recycle</div>
                    <div class="pill" data-cat="hazardous">Hazard</div>
                    <div class="pill" data-cat="mixed">Mixed</div>
                </div>

                <div id="routeOptimizerWrapper" style="display:none; margin-top:8px;">
                    <button id="btnOptimizeRoute" class="btn gradient-brand w-100"
                        style="padding:8px; font-size:12px; border-radius:var(--radius-sm);"><span
                            style="margin-right:4px;">✨</span> Optimize My Route</button>
                    <button id="btnClearRoute" class="btn nm-inset w-100 mt-2"
                        style="padding:8px; font-size:12px; border-radius:var(--radius-sm); display:none;">Clear
                        Route</button>
                </div>
            </div>

            <div class="panel-content" id="listContent">
                <!-- Data injected via JS -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>

    <script>
        let map = null;
        let markersGroup = null;
        let allData = [];
        let currentFilter = 'all';
        let currentCategoryFilter = 'all';
        let optimizedRouteMode = false;
        let optimizedSequence = [];

        const getEmoji = (cat) => {
            const m = { 'biodegradable': '🌱', 'recyclable': '♻️', 'non-biodegradable': '🗑️', 'hazardous': '⚠️', 'special': '🛋️', 'mixed': '📦' };
            return m[cat?.toLowerCase()] || '📦';
        };

        const parseTags = (str) => {
            if (!str) return [];
            try { return typeof str === 'string' ? JSON.parse(str) : str; } catch { return []; }
        };

        // Haversine formula (km)
        function haversineKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user || user.role !== 'collector') { window.location.href = 'login.html'; return; }

            if (user.barangay_id) {
                try {
                    const locRes = await apiFetch('/api/locations');
                    const loc = locRes.data?.find(l => l.location_id === user.barangay_id);
                    if (loc) {
                        document.getElementById('masterMapTitle').textContent = `Requests in ${loc.barangay_name}`;
                    }
                } catch (e) { }
            } else {
                document.getElementById('masterMapTitle').innerHTML = `Requests <span style="color:var(--status-warning); font-size:12px;">(No Barangay Assigned)</span>`;
            }

            initMap();
            setupFilters();
            await fetchData();

            // Setup Optimizer
            document.getElementById('btnOptimizeRoute').addEventListener('click', optimizeRoute);
            document.getElementById('btnClearRoute').addEventListener('click', clearRoute);
        });

        function initMap() {
            // Default center Manila
            map = L.map('masterMap', { zoomControl: false }).setView([14.5995, 120.9842], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.control.zoom({ position: 'bottomleft' }).addTo(map);
            markersGroup = L.featureGroup().addTo(map);
        }

        function setupFilters() {
            // Status Toggle
            document.querySelectorAll('#statusFilters .pill').forEach(el => {
                el.addEventListener('click', (e) => {
                    document.querySelectorAll('#statusFilters .pill').forEach(p => p.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    optimizedRouteMode = false; // Reset optimizer on filter chance
                    document.getElementById('btnClearRoute').style.display = 'none';
                    document.getElementById('btnOptimizeRoute').style.display = 'block';
                    renderUI();
                });
            });

            // Category Toggle
            document.querySelectorAll('#categoryFilters .pill').forEach(el => {
                el.addEventListener('click', (e) => {
                    document.querySelectorAll('#categoryFilters .pill').forEach(p => p.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategoryFilter = e.target.dataset.cat;
                    optimizedRouteMode = false; // Reset optimizer
                    document.getElementById('btnClearRoute').style.display = 'none';
                    document.getElementById('btnOptimizeRoute').style.display = 'block';
                    renderUI();
                });
            });
        }

        async function fetchData() {
            const lc = document.getElementById('listContent');
            showSkeletonList(lc, 4, 'card', 4);

            try {
                // Fetch both pending (available) and scheduled (assigned to me)
                const [pendingRes, assignedRes] = await Promise.all([
                    apiFetch('/api/waste/pending'),
                    apiFetch('/api/waste/assigned')
                ]);

                const pending = (pendingRes.data || []).map(d => ({ ...d, viewMode: 'pending' }));
                const assigned = (assignedRes.data || []).filter(d => d.collection_status === 'scheduled').map(d => ({ ...d, viewMode: 'scheduled' }));

                allData = [...pending, ...assigned];
                renderUI();

            } catch (e) {
                lc.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted);">Failed to load map data.</div>`;
            }
        }

        function activeData() {
            let filtered = allData;

            // Step 1: Mode filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(d => d.viewMode === currentFilter);
            }

            // Step 2: Category filter
            if (currentCategoryFilter !== 'all') {
                filtered = filtered.filter(d => {
                    const cat = (d.confirmed_category || d.predicted_category || 'mixed').toLowerCase();
                    if (currentCategoryFilter === 'hazardous') return cat === 'hazardous' || cat === 'special';
                    if (currentCategoryFilter === 'bio') return cat === 'biodegradable'; // Catch legacy strings if any
                    return cat.includes(currentCategoryFilter);
                });
            }

            return filtered;
        }

        function renderUI() {
            // Filter Data
            let filtered = activeData();

            // Optimizer logic check - only show optimizer button if we have >= 2 scheduled items visible
            const scheduledItems = filtered.filter(d => d.viewMode === 'scheduled');
            const optimizerWrapper = document.getElementById('routeOptimizerWrapper');
            if (scheduledItems.length >= 2 && !optimizedRouteMode) {
                optimizerWrapper.style.display = 'block';
            } else if (!optimizedRouteMode) {
                optimizerWrapper.style.display = 'none';
            }

            // Apply sequencing if active
            if (optimizedRouteMode) {
                filtered = optimizedSequence; // Override generic filter if we've specifically opted to view our route
            }

            document.getElementById('counterBadge').textContent = `${filtered.length} Stops`;

            // Map
            markersGroup.clearLayers();
            const listHtml = [];

            if (filtered.length === 0) {
                document.getElementById('listContent').innerHTML = `
                    <div style="text-align:center; padding:40px; background:var(--bg-inset); border-radius:var(--radius-md);">
                        <div style="font-size:2rem; opacity:0.5; margin-bottom:10px;">🗺️</div>
                        <div style="font-size:14px; color:var(--text-secondary);">No zones found for this filter.</div>
                    </div>`;
                return;
            }

            filtered.forEach(d => {
                const lat = parseFloat(d.latitude);
                const lng = parseFloat(d.longitude);
                if (isNaN(lat) || isNaN(lng)) return;

                const cat = d.confirmed_category || d.predicted_category || 'mixed';
                const emoji = getEmoji(cat);
                const isMyPickup = d.viewMode === 'scheduled';
                const markerColor = isMyPickup ? '#10B981' : '#6366F1'; // Emerald for mine, Indigo for pending

                // Route Optimizer logic
                let routeSequenceLabel = '';
                if (optimizedRouteMode && isMyPickup) {
                    const idx = optimizedSequence.findIndex(s => s.submission_id === d.submission_id);
                    if (idx > -1) {
                        routeSequenceLabel = `<div style="position:absolute; top:-10px; right:-10px; background:#1B2E1B; color:#CCFF00; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; border:2px solid white; z-index:100;">${idx + 1}</div>`;
                    }
                }

                // Custom Leaflet DivIcon
                const iconHtml = `
                    <div style="position:relative; background:${markerColor}; width:32px; height:32px; border-radius:50%; border:3px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; font-size:14px; color:white;">
                        ${emoji}
                        ${routeSequenceLabel}
                    </div>
                `;
                const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [32, 32], iconAnchor: [16, 16] });

                const marker = L.marker([lat, lng], { icon: customIcon });

                // Build Detailed Popup
                const tags = parseTags(d.waste_types).join(', ') || cat;
                const loc = d.address_description || d.barangay_name || 'No address';
                const createdAgo = window.timeAgo ? timeAgo(d.created_at) : '';

                // Image Logic
                const imgSrc = d.image_path ? `${d.image_path}` : '../assets/mascot4.png';
                const imgLabel = d.image_path ? '' : '<div style="font-size:10px; text-align:center; color:#888;">No image provided</div>';

                // Confidence Bar Logic
                const confScore = d.confidence_score ? parseFloat(d.confidence_score) : 0;
                let barColor = 'var(--status-collected)'; // Green default
                if (confScore < 0.6) barColor = 'var(--status-pending)'; // Orange
                if (confScore < 0.4) barColor = 'var(--status-denied)'; // Red

                let aiBlock = '';
                if (d.predicted_category) {
                    const pct = (confScore <= 1 && confScore > 0) ? Math.round(confScore * 100) : Math.round(confScore);
                    const safePct = Math.min(100, pct);
                    aiBlock = `
                        <div style="margin-bottom:8px;">
                            <div style="font-size:11px; font-weight:600; margin-bottom:2px;">AI Suggested: ${d.predicted_category}</div>
                            <div style="width:100%; height:6px; background:var(--bg-inset); border-radius:3px; overflow:hidden;">
                                <div style="height:100%; width:${safePct}%; background:${barColor};"></div>
                            </div>
                            <div style="font-size:10px; color:#888; text-align:right;">${safePct}% confidence</div>
                        </div>
                    `;

                    if (d.confirmed_category && d.confirmed_category !== d.predicted_category) {
                        aiBlock += `<div style="font-size:10px; font-style:italic; color:#888; margin-bottom:8px;">Resident changed AI suggestion.</div>`;
                    }
                }

                // Badge color mapped roughly
                const badgeColor = cat === 'biodegradable' ? 'var(--status-collected)' : cat === 'recyclable' ? 'var(--status-accepted)' : (cat === 'hazardous' || cat === 'special') ? 'var(--status-pending)' : '#888';

                // Resident Contact
                const residentName = escapeHtml(d.full_name || 'Unknown Resident');
                const residentEmail = escapeHtml(d.email || 'No email');

                let actionBtnHTML = '';
                if (isMyPickup) {
                    actionBtnHTML = `
                        <div class="d-flex gap-2 mt-2">
                            <button class="btn gradient-brand w-100" style="padding:6px; font-size:12px; flex:2;" onclick="completeSub(${d.submission_id}, '${escapeHtml(loc)}')">✓ Mark Collected</button>
                            <button class="btn nm-inset w-100" style="padding:6px; font-size:12px; flex:1; border:1px solid var(--status-denied); color:var(--status-denied);" onclick="reportProblemSub(${d.submission_id})">Report</button>
                        </div>
                    `;
                } else {
                    actionBtnHTML = `<button class="btn nm-inset mt-2 w-100" style="border:1px solid var(--text-muted); font-size:12px; padding:6px;" onclick="acceptSub(${d.submission_id})">Claim Request</button>`;
                }

                marker.bindPopup(`
                    <div style="min-width:240px; max-width: 260px;">
                        <!-- Top Image -->
                        <div style="width:100%; height:120px; border-radius:var(--radius-sm); overflow:hidden; background:var(--bg-inset); margin-bottom:10px;">
                            <img src="${imgSrc}" style="width:100%; height:100%; object-fit:cover;" />
                        </div>
                        ${imgLabel}
                        
                        <div style="font-weight:700; font-size:14px; margin-bottom:4px; color:var(--brand-emerald);">${isMyPickup ? 'Your Route' : 'Pending Request'}</div>
                        <div style="font-size:12px; margin-bottom:2px;">📍 ${loc}</div>
                        <div style="font-size:10px; color:#888; margin-bottom:12px;">🕒 Submitted ${createdAgo}</div>
                        
                        <!-- Confirmation badge -->
                        <div style="margin-bottom:8px;">
                            <span style="font-size:11px; font-weight:600;">Confirmed Category:</span>
                            <span class="badge" style="background:${badgeColor}; color:white; margin-left:4px;">${cat}</span>
                        </div>
                        
                        <!-- AI Block -->
                        ${aiBlock}
                        
                        <!-- Resident Info -->
                        <div style="background:var(--bg-inset); padding:8px; border-radius:var(--radius-sm); margin-bottom:12px;">
                            <div style="font-size:11px; font-weight:600;">👤 ${residentName}</div>
                            <div style="font-size:10px; color:#666;">✉️ ${residentEmail}</div>
                        </div>

                        ${actionBtnHTML}
                    </div>
                `);

                // Map Click -> Scroll List
                marker.on('click', () => {
                    document.querySelectorAll('.map-list-card').forEach(c => c.classList.remove('selected'));
                    const card = document.getElementById(`card-${d.submission_id}`);
                    if (card) {
                        card.classList.add('selected');
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });

                markersGroup.addLayer(marker);

                // Build List Item (add routing index logic)
                let itemHeaderHtml = isMyPickup ? `<span style="color:var(--brand-emerald);">●</span> Scheduled` : `<span style="color:var(--brand-blue);">●</span> New`;
                let distanceLabel = '';

                if (optimizedRouteMode && isMyPickup) {
                    const idx = optimizedSequence.findIndex(s => s.submission_id === d.submission_id);
                    itemHeaderHtml = `<span style="color:var(--brand-emerald); font-weight:800; background:rgba(16,185,129,0.15); border-radius:4px; padding:2px 6px; margin-right:4px;">#${idx + 1}</span> Scheduled`;

                    if (d.routeDistanceKm !== undefined && d.routeDistanceKm > 0) {
                        distanceLabel = `<span style="color:var(--brand-emerald); font-size:11px; font-weight:bold; margin-left:8px;">+${d.routeDistanceKm.toFixed(1)} km</span>`;
                    }
                }

                listHtml.push(`
                    <div class="map-list-card" id="card-${d.submission_id}" onclick="focusMarker(${lat}, ${lng}, ${d.submission_id})">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div style="font-weight:600; font-size:var(--text-sm); display:flex; align-items:center;">
                                ${itemHeaderHtml}
                                ${distanceLabel}
                            </div>
                            <div style="font-size:16px;">${emoji}</div>
                        </div>
                        <div style="font-size:12px; color:var(--text-secondary); margin-bottom:8px; line-height:1.3;">
                            📍 ${loc}
                        </div>
                        <div style="font-size:11px; color:var(--text-muted); margin-bottom:8px;">
                            ${tags}
                        </div>
                        <div class="d-flex gap-2">
                            ${actionBtnHTML}
                        </div>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank" class="btn btn-ghost mt-2 border" style="width:100%; padding:6px; font-size:12px; text-decoration:none; text-align:center;">Nav ↗</a>
                    </div>
                `);
            });

            document.getElementById('listContent').innerHTML = listHtml.join('');

            // Fit bounds if markers exist
            if (markersGroup.getLayers().length > 0) {
                map.fitBounds(markersGroup.getBounds(), { padding: [50, 50], maxZoom: 15 });
            }
        }

        // Setup Optimizer functions
        async function optimizeRoute() {
            let items = activeData().filter(d => d.viewMode === 'scheduled');
            if (items.length < 2) return;

            // Simple greedy Haversine O(n^2) algorithm
            let unvisited = [...items];
            let current = unvisited.shift(); // Start eagerly at the first listed node. If we had user GPS we could inject a fake start node here.

            let sorted = [current];

            while (unvisited.length > 0) {
                let nearestIdx = 0;
                let minDst = Infinity;

                for (let i = 0; i < unvisited.length; i++) {
                    const dst = haversineKm(
                        parseFloat(current.latitude), parseFloat(current.longitude),
                        parseFloat(unvisited[i].latitude), parseFloat(unvisited[i].longitude)
                    );
                    if (dst < minDst) {
                        minDst = dst;
                        nearestIdx = i;
                    }
                }

                unvisited[nearestIdx].routeDistanceKm = minDst;
                current = unvisited.splice(nearestIdx, 1)[0];
                sorted.push(current);
            }

            optimizedSequence = sorted;
            optimizedRouteMode = true;

            document.getElementById('btnOptimizeRoute').style.display = 'none';
            document.getElementById('btnClearRoute').style.display = 'block';

            renderUI();

            // Re-draw polylines to show flow
            const latlngs = sorted.map(d => [parseFloat(d.latitude), parseFloat(d.longitude)]);
            if (window.routePolyline) window.routePolyline.remove();
            window.routePolyline = L.polyline(latlngs, { color: '#10B981', weight: 3, dashArray: '10, 10' }).addTo(map);

            showToast('Calculated Greedy Optimal Route', 'success');
        }

        function clearRoute() {
            optimizedRouteMode = false;
            optimizedSequence = [];
            document.getElementById('btnClearRoute').style.display = 'none';
            document.getElementById('btnOptimizeRoute').style.display = 'block';
            if (window.routePolyline) {
                window.routePolyline.remove();
                window.routePolyline = null;
            }
            renderUI();
        }

        window.focusMarker = function (lat, lng, id) {
            document.querySelectorAll('.map-list-card').forEach(c => c.classList.remove('selected'));
            const card = document.getElementById(`card-${id}`);
            if (card) card.classList.add('selected');

            map.flyTo([lat, lng], 16, { animate: true, duration: 0.5 });

            // Find and open popup
            markersGroup.eachLayer(layer => {
                const ll = layer.getLatLng();
                if (ll.lat === lat && ll.lng === lng) {
                    layer.openPopup();
                }
            });
        };

        window.acceptSub = async function (id) {
            const confirmed = await showConfirmToast('Claim Request?', 'Claim this request for your route?');
            if (!confirmed) return;
            try {
                const res = await apiFetch(`/api/waste/${id}/accept`, { method: 'POST' });
                if (res.status === 'success') { showToast('Added to route', 'success'); await fetchData(); }
            } catch (e) { }
        };

        window.completeSub = async function (id, addressLabel) {
            // Feature 2: Inline Note Confirmation
            const notes = await showPromptToast('Confirm Collection', `Confirm you have physically collected this waste at ${addressLabel}`, 'Collection Note (optional)');

            if (notes === false) return; // Cancelled
            // if notes is " ", it means confirmed but empty string

            try {
                const res = await apiFetch(`/api/waste/${id}/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ collector_notes: notes.trim() })
                });

                if (res.status === 'success') {
                    showToast('Stop completed', 'success');
                    await fetchData();
                }
            } catch (e) { }
        };

        window.reportProblemSub = async function (id) {
            // Feature 3 inline form inside a custom dialog (to handle selects and inputs)
            const formHTML = `
                <div style="text-align:left;">
                    <label style="display:block; margin-bottom:4px; font-size:12px; font-weight:bold;">Problem Type:</label>
                    <select id="prob-type-select" style="width:100%; padding:8px; border-radius:4px; margin-bottom:12px; background:var(--bg-inset); border:1px solid rgba(0,0,0,0.1);">
                        <option value="Wrong or incomplete address">Wrong or incomplete address</option>
                        <option value="Resident not home / no access">Resident not home / no access</option>
                        <option value="Waste not ready for collection">Waste not ready for collection</option>
                        <option value="Safety concern">Safety concern</option>
                        <option value="Other">Other</option>
                    </select>
                    
                    <label style="display:block; margin-bottom:4px; font-size:12px; font-weight:bold;">Additional Details:</label>
                    <textarea id="prob-desc-text" placeholder="Optional details..." style="width:100%; padding:8px; min-height:60px; border-radius:4px; background:var(--bg-inset); border:1px solid rgba(0,0,0,0.1); font-family:inherit;"></textarea>
                </div>
            `;

            window.showConfirmDialog({
                title: 'Report a Problem',
                body: formHTML,
                iconBg: 'rgba(198, 40, 40, 0.1)',
                icon: '⚠️',
                confirmLabel: 'Submit Report',
                confirmClass: 'btn-emerald', // Note: style allows custom, maybe inline red styling via class?
            }, async () => {
                const pType = document.getElementById('prob-type-select').value;
                const pDesc = document.getElementById('prob-desc-text').value;

                try {
                    const res = await apiFetch(`/api/waste/${id}/report-problem`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ problem_type: pType, problem_description: pDesc.trim() })
                    });

                    if (res.status === 'success') {
                        showToast('Problem reported. Admin notified.', 'warning');
                        await fetchData();
                    }
                } catch (e) { }
            }, () => { });
        };
    </script>
</body>

</html>
