<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <style>
        /* Analytics Specific Styles */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            background: var(--bg-inset);
            border-radius: var(--radius-md);
            padding: var(--space-4);
        }

        #heatmapMap {
            width: 100%;
            height: 400px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-inset);
            z-index: 1;
        }

        /* Custom leaflet styles for dark map */
        .leaflet-container {
            background: #1a1a1a;
        }

        .filter-select {
            background: var(--bg-inset);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            outline: none;
            font-size: var(--text-sm);
        }

        .stat-card.lime {
            border-top: 3px solid var(--brand-lime);
        }
    </style>
</head>

<body class="stagger-1">

    <div class="main-content">
        <!-- Header -->
        <div class="d-flex align-items-center justify-content-between mb-5">
            <div>
                <a href="dashboard-admin.html" class="text-secondary text-sm mb-2"
                    style="display:inline-block; text-decoration:none;">← Back to Dashboard</a>
                <h1 style="margin:0; font-size:var(--text-2xl);">Analytics & Intel</h1>
                <p class="text-secondary mt-1">Data-driven insights on collection performance and waste density.</p>
            </div>
        </div>

        <!-- Top Metrics Cards -->
        <div class="card-grid-3 mb-5">
            <div class="nm-raised stat-card lime custom-radius" style="padding:var(--space-4);">
                <div class="text-secondary mb-2"
                    style="font-weight:600; font-size:var(--text-xs); text-transform:uppercase;">Pending Pickups</div>
                <div style="font-size:2.5rem; font-weight:800; color:var(--text-primary);" id="pendingCount">-</div>
            </div>

            <div class="nm-raised stat-card custom-radius" style="padding:var(--space-4);">
                <div class="text-secondary mb-2"
                    style="font-weight:600; font-size:var(--text-xs); text-transform:uppercase;">Active Routes</div>
                <div style="font-size:2.5rem; font-weight:800; color:var(--brand-emerald);" id="assignedCount">-</div>
            </div>

            <div class="nm-raised stat-card custom-radius" style="padding:var(--space-4);">
                <div class="text-secondary mb-2"
                    style="font-weight:600; font-size:var(--text-xs); text-transform:uppercase;">Platform Users</div>
                <div style="font-size:2.5rem; font-weight:800; color:var(--brand-blue);" id="userCount">-</div>
            </div>
        </div>

        <!-- Charts Row -->
        <div
            style="display:grid; grid-template-columns:repeat(auto-fit, minmax(400px, 1fr)); gap:var(--space-5); margin-bottom:var(--space-6);">

            <!-- Waste Mix Donut Chart -->
            <div>
                <h2 style="font-size:var(--text-lg); margin-bottom:var(--space-3);">Waste Composition</h2>
                <div class="chart-container custom-radius">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- Daily Trend Line Chart -->
            <div>
                <h2 style="font-size:var(--text-lg); margin-bottom:var(--space-3);">Submission Volume (30D)</h2>
                <div class="chart-container custom-radius">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

        </div>

        <!-- Heatmap Section -->
        <div class="mb-5">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 style="font-size:var(--text-lg); margin:0;">Density Heatmap</h2>
                <div class="d-flex gap-2">
                    <select id="heatmapDays" class="filter-select">
                        <option value="7">Last 7 Days</option>
                        <option value="30" selected>Last 30 Days</option>
                        <option value="90">Last 90 Days</option>
                    </select>
                    <button class="btn btn-ghost" id="reloadHeatmapBtn" style="padding:8px; font-size:16px;">🔄</button>
                </div>
            </div>

            <div class="nm-raised custom-radius" style="padding:var(--space-2);">
                <div id="heatmapMap"></div>
            </div>
            <div id="heatmapMeta" class="text-muted mt-2 text-center" style="font-size:var(--text-xs);">Loading heat map
                data...</div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>

    <!-- Dependencies for Heatmap & Charts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // Chart overrides for light theme
        Chart.defaults.color = '#3D6B3D'; // --text-secondary
        Chart.defaults.font.family = "'Plus Jakarta Sans', system-ui, sans-serif";

        // Brand color mapping
        const colorMap = {
            'biodegradable': '#10B981', // Emerald
            'recyclable': '#3B82F6',    // Blue
            'non-biodegradable': '#F59E0B', // Amber
            'special': '#8B5CF6',       // Purple
            'hazardous': '#EF4444',     // Red
            'mixed': '#6B7280'          // Gray
        };

        const labelMap = {
            'biodegradable': 'Biodegradable',
            'recyclable': 'Recyclable',
            'non-biodegradable': 'Non-Biodegradable',
            'special': 'Special',
            'hazardous': 'Hazardous',
            'mixed': 'Mixed'
        };

        let categoryChartInst = null;
        let trendChartInst = null;
        let heatmapMap = null;
        let heatLayer = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user || user.role !== 'admin') { window.location.href = 'login.html'; return; }

            // Kick off data fetches
            loadTopMetrics();
            initChartsAndMap();
        });

        async function loadTopMetrics() {
            // Apply lightweight skeleton
            document.getElementById('pendingCount').innerHTML = '<div class="skeleton" style="height:40px; width:60px; border-radius:4px; margin-top:8px;"></div>';
            document.getElementById('assignedCount').innerHTML = '<div class="skeleton" style="height:40px; width:60px; border-radius:4px; margin-top:8px;"></div>';
            document.getElementById('userCount').innerHTML = '<div class="skeleton" style="height:40px; width:60px; border-radius:4px; margin-top:8px;"></div>';

            try {
                const [pend, scheduled, usr] = await Promise.all([
                    apiFetch('/api/waste/pending'),
                    apiFetch('/api/waste/all?status=scheduled&limit=5000&offset=0'),
                    apiFetch('/api/users')
                ]);
                document.getElementById('pendingCount').textContent = (pend.data || []).length;
                document.getElementById('assignedCount').textContent = (scheduled.data || []).length;
                document.getElementById('userCount').textContent = (usr.data || []).length;
            } catch (e) {
                console.warn('Metrics failed', e);
                document.getElementById('pendingCount').textContent = '-';
                document.getElementById('assignedCount').textContent = '-';
                document.getElementById('userCount').textContent = '-';
            }
        }

        function normalizeWasteTypes(value) {
            if (!value) return [];
            if (Array.isArray(value)) {
                return value.map(v => String(v).trim()).filter(Boolean);
            }
            if (typeof value === 'string') {
                const raw = value.trim();
                if (!raw) return [];
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) return parsed.map(v => String(v).trim()).filter(Boolean);
                    if (typeof parsed === 'string') return [parsed.trim()].filter(Boolean);
                    return [];
                } catch (e) {
                    return raw.split(',').map(s => s.trim()).filter(Boolean);
                }
            }
            return [];
        }

        function normalizeCategoryKey(value) {
            const clean = String(value || '').toLowerCase().trim();
            if (!clean) return null;
            if (clean === 'non biodegradable' || clean === 'non_biodegradable' || clean === 'nonbiodegradable') return 'non-biodegradable';
            if (clean === 'bio' || clean === 'biodegradable') return 'biodegradable';
            if (clean === 'recycle' || clean === 'recyclable') return 'recyclable';
            if (clean === 'hazard' || clean === 'hazardous') return 'hazardous';
            if (clean === 'special') return 'special';
            if (clean === 'mixed' || clean === 'unknown') return 'mixed';
            return clean;
        }

        function extractSubmissionCategories(submission) {
            const fromTypes = normalizeWasteTypes(submission?.waste_types).map(normalizeCategoryKey).filter(Boolean);
            if (fromTypes.length > 0) return fromTypes;

            const fallback = normalizeCategoryKey(submission?.confirmed_category || submission?.predicted_category || submission?.category);
            return fallback ? [fallback] : ['mixed'];
        }

        function renderCategoryDonut(allSubs) {
            const counts = { biodegradable: 0, recyclable: 0, 'non-biodegradable': 0, special: 0, hazardous: 0, mixed: 0 };

            allSubs.forEach(s => {
                const cats = extractSubmissionCategories(s);
                cats.forEach(c => {
                    const clean = normalizeCategoryKey(c) || 'mixed';
                    if (counts[clean] !== undefined) counts[clean] += 1;
                    else counts.mixed += 1;
                })
            });

            const labels = Object.keys(counts).filter(k => counts[k] > 0);
            const dataVals = labels.map(k => counts[k]);
            const bgColors = labels.map(k => colorMap[k]);

            const ctx = document.getElementById('categoryChart').getContext('2d');

            if (categoryChartInst) categoryChartInst.destroy();

            categoryChartInst = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.map(l => labelMap[l] || l),
                    datasets: [{ data: dataVals, backgroundColor: bgColors, borderWidth: 0, hoverOffset: 4 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { usePointStyle: true, padding: 16 } },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0) || 1;
                                    const val = ctx.parsed || 0;
                                    const pct = ((val / total) * 100).toFixed(1);
                                    return ` ${val} (${pct}%)`;
                                }
                            }
                        }
                    },
                    cutout: '70%'
                }
            });
        }

        function initChartsAndMap() {
            // Leaflet map setup (Dark theme via CartoDB DarkMatter equivalent tiles)
            heatmapMap = L.map('heatmapMap', { scrollWheelZoom: false }).setView([14.5995, 120.9842], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(heatmapMap);

            heatLayer = L.heatLayer([], {
                radius: 28,
                blur: 22,
                maxZoom: 15,
                minOpacity: 0.35,
                gradient: {
                    0.25: '#FFD54A',
                    0.6: '#FF8A00',
                    1.0: '#FF2D2D'
                }
            }).addTo(heatmapMap);

            document.getElementById('heatmapDays').addEventListener('change', loadHeatmapData);
            document.getElementById('reloadHeatmapBtn').addEventListener('click', loadHeatmapData);

            loadHeatmapData();
        }

        async function loadHeatmapData() {
            const days = document.getElementById('heatmapDays').value;
            document.getElementById('heatmapMeta').textContent = 'Fetching spatial data...';

            try {
                const res = await apiFetch(`/api/analytics/heatmap?days=${days}`);
                const data = res.data;

                // Update map
                const heatPoints = (data.points || []).map(p => [p.lat, p.lng, p.weight || 1]);
                heatLayer.setLatLngs(heatPoints);
                if (heatPoints.length > 0) {
                    heatmapMap.fitBounds(L.latLngBounds(heatPoints), { padding: [50, 50], maxZoom: 14 });
                }

                document.getElementById('heatmapMeta').textContent = `Showing ${heatPoints.length} mapped submissions.`;

                // Update Trend Line chart
                renderTrendChart(data.temporal?.daily || []);
                renderCategoryDonut(data.points || []);

            } catch (e) {
                document.getElementById('heatmapMeta').textContent = 'Failed to load heatmap data.';
            }
        }

        function renderTrendChart(dailyData) {
            // dailyData is [{day:'2023-10-01', count:5}, ...] format from API
            const ctx = document.getElementById('trendChart').getContext('2d');

            if (trendChartInst) trendChartInst.destroy();

            // Reverse to show oldest -> newest left-to-right if API provides newest first, or just map directly
            // Ensure sorted by date
            const sorted = [...dailyData].sort((a, b) => new Date(a.day) - new Date(b.day));

            let labels = sorted.map(d => {
                const parts = d.day.split('-');
                return `${parts[1]}/${parts[2]}`; // MM/DD
            });
            let vals = sorted.map(d => parseInt(d.count));

            // If empty, mock UI
            if (labels.length === 0) {
                labels = ['No Data']; vals = [0];
            }

            const barGradient = ctx.createLinearGradient(0, 0, 0, 300);
            barGradient.addColorStop(0, 'rgba(255, 138, 0, 0.65)');
            barGradient.addColorStop(1, 'rgba(255, 45, 45, 0.15)');

            trendChartInst = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        type: 'bar',
                        label: 'Submissions',
                        data: vals,
                        backgroundColor: barGradient,
                        borderColor: 'rgba(255, 138, 0, 0.9)',
                        borderWidth: 1,
                        borderRadius: 10,
                        maxBarThickness: 22
                    }, {
                        type: 'line',
                        label: 'Trend',
                        data: vals,
                        borderColor: '#FFD54A',
                        backgroundColor: 'rgba(255, 213, 74, 0.15)',
                        borderWidth: 2.5,
                        tension: 0.35,
                        fill: false,
                        pointRadius: 0,
                        pointHitRadius: 12,
                        pointHoverRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            intersect: false,
                            mode: 'index',
                            callbacks: {
                                label: (ctx) => {
                                    if (ctx.dataset.type !== 'bar') return '';
                                    const v = ctx.parsed?.y ?? ctx.parsed ?? 0;
                                    return ` ${v} submissions`;
                                }
                            },
                            filter: (ctx) => ctx.dataset.type === 'bar'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { precision: 0 },
                            grid: { color: 'rgba(0,0,0,0.08)' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxRotation: 0, autoSkip: true }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
