<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Dashboard - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .hero-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
        }

        @media (max-width: 640px) {
            .hero-card {
                flex-direction: column;
                text-align: center;
                gap: var(--space-4);
            }
        }

        .schedule-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-4);
        }

        @media (max-width: 1024px) {
            .schedule-row {
                display: flex;
                overflow-x: auto;
                padding-bottom: var(--space-4);
                scroll-snap-type: x mandatory;
            }

            .schedule-row>div {
                min-width: 280px;
                scroll-snap-align: start;
            }
        }

        .recent-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4);
            margin-bottom: var(--space-3);
        }

        .recent-info {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        @media (max-width: 640px) {
            .recent-list-item {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }
        }
    </style>
</head>

<body class="stagger-1">

    <div class="main-content">
        <!-- Hero Greeting -->
        <div class="nm-raised hero-card mb-4" style="padding:var(--space-6);">
            <div style="z-index: 2;">
                <h1 id="greetingText" class="gradient-text"
                    style="font-size:var(--text-4xl); margin-bottom:var(--space-2);">Loading...</h1>
                <p class="text-secondary" style="margin:0;">Here's what's happening in your barangay.</p>
            </div>
            <img src="../assets/mascot1.png" alt="Happy Mascot" class="mascot mascot-md" style="margin:0;">
        </div>

        <!-- 3 Stat Cards -->
        <div class="card-grid-3 mb-4">
            <div class="nm-raised" style="padding:var(--space-5);">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="gradient-brand"
                        style="width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;">
                        📦</div>
                    <div class="text-secondary font-weight-bold" style="font-size:var(--text-sm);">Total Submitted</div>
                </div>
                <div id="statTotal" style="font-size:var(--text-4xl); font-weight:800;">-</div>
            </div>

            <div class="nm-raised" style="padding:var(--space-5); border-top: 3px solid var(--status-pending);">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div
                        style="width:40px; height:40px; border-radius:50%; background:rgba(255,179,0,0.15); color:var(--status-pending); display:flex; align-items:center; justify-content:center; font-size:18px;">
                        ⏳</div>
                    <div class="text-secondary font-weight-bold" style="font-size:var(--text-sm);">Pending Pickups</div>
                </div>
                <div id="statPending" style="font-size:var(--text-4xl); font-weight:800; color:var(--status-pending);">-
                </div>
            </div>

            <div class="nm-raised" style="padding:var(--space-5); border-top: 3px solid var(--brand-emerald);">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div
                        style="width:40px; height:40px; border-radius:50%; background:rgba(0,200,83,0.15); color:var(--status-collected); display:flex; align-items:center; justify-content:center; font-size:18px;">
                        ✅</div>
                    <div class="text-secondary font-weight-bold" style="font-size:var(--text-sm);">Collected</div>
                </div>
                <div id="statCollected"
                    style="font-size:var(--text-4xl); font-weight:800; color:var(--status-collected);">-</div>
            </div>
        </div>

        <!-- Upcoming Schedules -->
        <div class="nm-raised mb-4" style="padding:var(--space-6);">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h2 style="margin:0;">📅 Your Collection Schedules</h2>
                <div id="userBarangayBadge" class="badge badge-role-admin" style="display:none;"></div>
            </div>

            <div id="scheduleContainer" class="schedule-row">
                <!-- Skeletons populated by JS -->
            </div>
        </div>

        <!-- Recent Submissions -->
        <div>
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 style="margin:0;">Recent Submissions</h2>
                <a href="my-submissions.html" style="font-size:var(--text-sm);">View all →</a>
            </div>

            <div id="recentSubmissionsContainer">
                <!-- Skeletons populated by JS -->
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <a href="submit-waste.html" class="fab gradient-brand" title="Submit Waste">
        ♻️
    </a>

    <!-- Global Layout Injector -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>

    <script>
        const getWasteEmoji = (category) => {
            const map = { 'biodegradable': '🌱', 'recyclable': '♻️', 'non-biodegradable': '🗑️', 'hazardous': '⚠️', 'special': '🛋️', 'mixed': '📦' };
            return map[category?.toLowerCase()] || '📦';
        };

        const formatTime = (timeStr) => {
            if (!timeStr) return '';
            const [h, m] = timeStr.split(':');
            return new Date(2000, 0, 1, h, m).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const user = await checkAuthStatus();
                if (!user) { window.location.href = 'login.html'; return; }
                if (user.role !== 'resident' && user.role !== 'admin') { window.location.href = 'login.html'; return; }

                // Greeting Hero
                const greeting = getGreeting(user.full_name || 'Resident');
                document.getElementById('greetingText').textContent = greeting;
                if (user.barangay_name) {
                    const badge = document.getElementById('userBarangayBadge');
                    badge.textContent = `${user.barangay_name}`;
                    badge.style.display = 'inline-flex';
                }

                // Show Skeletons
                showSkeletonList(document.getElementById('scheduleContainer'), 3, 'card');
                showSkeletonList(document.getElementById('recentSubmissionsContainer'), 3, 'row');

                // Generate Reminders first
                apiFetch('/api/notifications/generate-reminders', { method: 'POST' }).catch(e => { });

                // Fetch Data Concurrently
                const [schedData, subsData] = await Promise.all([
                    apiFetch('/api/schedules/upcoming').catch(() => ({ data: [] })),
                    apiFetch('/api/waste/my-submissions').catch(() => ({ data: [] }))
                ]);

                // Render Stats
                const submissions = subsData.data || [];
                document.getElementById('statTotal').textContent = submissions.length;
                document.getElementById('statPending').textContent = submissions.filter(s => s.collection_status === 'pending').length;
                document.getElementById('statCollected').textContent = submissions.filter(s => s.collection_status === 'collected').length;

                // Render Schedules
                const schedContainer = document.getElementById('scheduleContainer');
                if (schedData.data && schedData.data.length > 0) {
                    schedContainer.innerHTML = schedData.data.map(sch => `
                        <div class="nm-flat" style="padding:var(--space-4);">
                            <div class="badge gradient-brand mb-2" style="color:var(--bg-base);">${sch.collection_day}</div>
                            <div class="font-weight-bold" style="font-size:var(--text-lg); margin-bottom:4px;">${formatTime(sch.collection_time)}</div>
                            <div class="d-flex align-items-center gap-2 text-secondary">
                                <span>${getWasteEmoji(sch.waste_category_name || sch.waste_type)}</span>
                                <span>${sch.waste_category_name || sch.waste_type}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    schedContainer.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding:var(--space-6);">
                        <img src="../assets/mascot1.png" alt="Empty" class="mascot mascot-sm mb-3">
                        <div class="text-secondary">No upcoming schedules.</div>
                    </div>`;
                    // Adjust display property if empty
                    schedContainer.style.display = 'block';
                }

                // Render Recent
                const recentContainer = document.getElementById('recentSubmissionsContainer');
                if (submissions.length > 0) {
                    recentContainer.innerHTML = submissions.slice(0, 3).map(sub => {
                        const status = String(sub.collection_status || 'pending').toLowerCase();
                        const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
                        const mainCat = sub.category_name || sub.confirmed_category || sub.predicted_category || 'mixed';
                        const address = sub.address_description || sub.barangay_name || 'No address';
                        const addressTitle = String(address).split(',')[0] || address;

                        return `
                            <div class="recent-list-item nm-flat">
                                <div class="recent-info">
                                    <div style="font-size:24px;">${getWasteEmoji(mainCat)}</div>
                                    <div>
                                        <div style="font-weight:600;">${escapeHtml(addressTitle)}</div>
                                        <div class="text-muted" style="font-size:var(--text-xs);">${new Date(sub.created_at).toLocaleDateString()}</div>
                                    </div>
                                </div>
                                <div class="badge badge-${status}">${statusLabel}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    recentContainer.innerHTML = `<div style="text-align:center; padding:var(--space-6);">
                        <img src="../assets/mascot2.png" alt="Empty" class="mascot mascot-sm mb-3">
                        <div class="text-secondary">No submissions yet. Tap the button below to start!</div>
                    </div>`;
                }

            } catch (error) {
                console.error(error);
                showToast('Failed to load dashboard data.', 'error');
            }
        });
    </script>
</body>

</html>
