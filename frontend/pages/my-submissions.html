<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Submissions - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .submissions-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-4);
            margin-bottom: var(--space-5);
        }

        .submissions-header h1 {
            margin-bottom: var(--space-1);
            letter-spacing: -0.02em;
        }

        .submissions-header p {
            margin: 0;
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        .submissions-new-btn {
            padding: 10px 16px;
            font-size: var(--text-sm);
            border-radius: var(--radius-pill);
            white-space: nowrap;
            box-shadow: 0 10px 20px rgba(27, 94, 32, 0.08);
        }

        .submissions-new-btn:hover {
            text-decoration: none;
        }

        .filter-bar {
            display: flex;
            gap: var(--space-2);
            padding: var(--space-1) 0;
            margin-bottom: var(--space-5);
            overflow-x: auto;
            scrollbar-width: none;
            /* Firefox */
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        /* Chrome */

        .filter-btn {
            background: var(--bg-inset);
            color: var(--text-secondary);
            border: 2px solid transparent;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-pill);
            font-size: var(--text-sm);
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: rgba(110, 224, 0, 0.1);
            color: var(--brand-lime);
            border-color: var(--brand-lime);
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            background: rgba(46, 125, 50, 0.08);
            border: 1px solid rgba(46, 125, 50, 0.12);
            color: var(--text-secondary);
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .sub-card {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(46, 125, 50, 0.10);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .sub-card:hover {
            transform: translateY(-2px);
        }

        .sub-card-media {
            height: 150px;
            background: linear-gradient(180deg, rgba(46, 125, 50, 0.08), rgba(46, 125, 50, 0.02));
            position: relative;
        }

        .sub-card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .sub-card-media-fallback {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-weight: 600;
            font-size: var(--text-sm);
        }

        .sub-card-body {
            padding: var(--space-4);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .sub-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-3);
        }

        .sub-id {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .sub-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sub-emoji {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(46, 125, 50, 0.08);
            border: 1px solid rgba(46, 125, 50, 0.12);
            font-size: 18px;
        }

        .sub-cat {
            font-weight: 800;
            letter-spacing: 0.02em;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .sub-confidence {
            font-size: 11px;
            color: var(--brand-emerald);
            font-weight: 700;
        }

        .sub-meta {
            display: grid;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .sub-meta-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sub-actions {
            margin-top: auto;
            padding-top: var(--space-3);
            border-top: 1px solid rgba(46, 125, 50, 0.10);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: var(--space-2);
        }

        .btn-cancel {
            background: transparent;
            color: var(--status-denied);
            border: 1px solid var(--status-denied);
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: var(--text-xs);
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 61, 113, 0.1);
        }
    </style>
</head>

<body class="stagger-1">

    <div class="main-content">
        <div class="submissions-header">
            <div>
                <h1>My Submissions</h1>
                <p>Track your waste collection requests</p>
            </div>
            <a href="submit-waste.html" class="btn gradient-brand submissions-new-btn">+ New</a>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="scheduled">Scheduled</button>
            <button class="filter-btn" data-filter="collected">Collected</button>
        </div>

        <div id="submissionsContainer" class="card-grid-2">
            <!-- Skeleton cards injected via JS -->
        </div>
    </div>

    <!-- Global Layout Injector -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>

    <script>
        let allSubmissions = [];
        let activeFilter = 'all';

        const getWasteEmoji = (category) => {
            const map = { 'biodegradable': '🌱', 'recyclable': '♻️', 'non-biodegradable': '🗑️', 'hazardous': '⚠️', 'special': '🛋️', 'mixed': '📦' };
            return map[category?.toLowerCase()] || '📦';
        };

        const renderTags = (tagsStr, type) => {
            if (!tagsStr) return '';
            let tags = [];
            try { tags = typeof tagsStr === 'string' ? JSON.parse(tagsStr) : tagsStr; } catch (e) { }
            if (!Array.isArray(tags)) tags = [tagsStr];

            return tags.filter(t => t).map(t =>
                `<span class="tag-pill">${escapeHtml(t)}</span>`
            ).join('');
        };

        const formatDate = (dateString, includeTime = false) => {
            if (!dateString) return 'N/A';
            const d = new Date(dateString);
            const opts = { month: 'short', day: 'numeric', year: 'numeric' };
            if (includeTime) { opts.hour = 'numeric'; opts.minute = '2-digit'; }
            return d.toLocaleDateString('en-US', opts);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.role !== 'resident' && user.role !== 'admin') { window.location.href = 'login.html'; return; }

            setupFilters();
            await loadSubmissions();
        });

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    activeFilter = e.target.dataset.filter;
                    applyFilter();
                });
            });
        }

        async function loadSubmissions() {
            const container = document.getElementById('submissionsContainer');
            showSkeletonList(container, 4, 'card');

            try {
                const res = await apiFetch('/api/waste/my-submissions');
                allSubmissions = res.data || [];
                applyFilter();
            } catch (error) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align:center; padding:var(--space-6);">
                        <img src="../assets/mascot4.png" alt="Error" class="mascot mascot-sm mb-3">
                        <div class="text-secondary">Failed to load submissions.</div>
                    </div>
                `;
            }
        }

        function applyFilter() {
            const filtered = activeFilter === 'all'
                ? allSubmissions
                : allSubmissions.filter(s => (s.collection_status || 'pending').toLowerCase() === activeFilter);

            renderSubmissions(filtered);
        }

        function renderSubmissions(submissions) {
            const container = document.getElementById('submissionsContainer');

            if (submissions.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align:center; padding:var(--space-6);">
                        <img src="../assets/mascot2.png" alt="Empty" class="mascot mascot-sm mb-3" style="opacity:0.6;">
                        <h3 style="margin-bottom:var(--space-2);">No submissions found</h3>
                        <p class="text-secondary" style="font-size:var(--text-sm);">
                            ${activeFilter === 'all' ? 'You haven\'t made any requests yet.' : `Zero requests in ${activeFilter} state.`}
                        </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = submissions.map(sub => {
                const status = (sub.collection_status || 'pending').toLowerCase();
                const canCancel = status === 'pending';

                const imageHtml = sub.image_path
                    ? `<div class="sub-card-media"><img src=${JSON.stringify(sub.image_path)} alt="Submission image"></div>`
                    : `<div class="sub-card-media sub-card-media-fallback">No Image</div>`;

                const mainCat = sub.category_name || sub.confirmed_category || sub.predicted_category || 'mixed';
                const emoji = getWasteEmoji(mainCat);
                const confPct = (sub.confidence_score !== null && sub.confidence_score !== undefined) ? normalizeConfidencePct(sub.confidence_score) : 0;
                const confidenceHtml = confPct ? `<div class="sub-confidence">🤖 ${confPct}% match</div>` : '';

                const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);

                return `
                    <div class="nm-raised custom-radius sub-card">
                        ${imageHtml}
                        
                        <div class="sub-card-body">
                            <div class="sub-card-top">
                                <div class="badge badge-${status}" style="margin-bottom:0;">${statusLabel}</div>
                                <div class="sub-id">ID: #${sub.submission_id}</div>
                            </div>

                            <div class="sub-title">
                                <div class="sub-emoji">${emoji}</div>
                                <div>
                                    <div class="sub-cat">${escapeHtml(String(mainCat).toUpperCase())}</div>
                                    ${confidenceHtml}
                                </div>
                            </div>

                            <div>
                                <div style="font-size:11px; color:var(--text-muted); margin-bottom:6px; font-weight:700; letter-spacing:0.06em;">PROPERTIES</div>
                                <div>${renderTags(sub.waste_adjectives) || renderTags(sub.waste_types)}</div>
                            </div>

                            <div class="sub-meta">
                                <div class="sub-meta-row">
                                    <span>📍</span>
                                    <span class="text-truncate">${escapeHtml(sub.address_description || sub.barangay_name || 'No address')}</span>
                                </div>
                                <div class="sub-meta-row">
                                    <span>📅</span>
                                    <span>${formatDate(sub.created_at)}</span>
                                </div>
                            </div>

                            ${sub.waste_description ? `
                            <div class="nm-inset" style="padding:var(--space-3); font-size:12px; color:var(--text-secondary); max-height:84px; overflow-y:auto; line-height:1.4;">
                                &ldquo;${escapeHtml(sub.waste_description)}&rdquo;
                            </div>` : '<div style="flex:1;"></div>'}

                            <div class="sub-actions">
                                ${canCancel ? `<button class="btn-cancel" onclick="cancelSubmission(${sub.submission_id})">Cancel</button>` : `<span style="font-size:11px; color:var(--text-muted);">No actions available</span>`}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.cancelSubmission = async function (id) {
            // Using utils.js alert override logic implicitly if confirm not overridden, but stick to standard confirm for speed/safety if needed, or implement a custom modal. 
            // We'll use standard confirm for deletion safety unless a custom modal is built.
            const confirmed = await showConfirmToast('Cancel Submission?', 'Are you sure you want to cancel this pending submission?');
            if (!confirmed) return;

            try {
                const res = await apiFetch(`/api/waste/${id}`, { method: 'DELETE' });
                if (res.status === 'success') {
                    showToast('Submission cancelled', 'success');
                    loadSubmissions();
                }
            } catch (e) {
                // error handled globally
            }
        };
    </script>
</body>

</html>
