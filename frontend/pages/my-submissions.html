<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Submissions - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .filter-bar {
            display: flex;
            gap: var(--space-2);
            padding: var(--space-1) 0;
            margin-bottom: var(--space-5);
            overflow-x: auto;
            scrollbar-width: none;
            /* Firefox */
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        /* Chrome */

        .filter-btn {
            background: var(--bg-inset);
            color: var(--text-secondary);
            border: 2px solid transparent;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-pill);
            font-size: var(--text-sm);
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: rgba(110, 224, 0, 0.1);
            color: var(--brand-lime);
            border-color: var(--brand-lime);
        }

        .btn-cancel {
            background: transparent;
            color: var(--status-denied);
            border: 1px solid var(--status-denied);
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: var(--text-xs);
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 61, 113, 0.1);
        }
    </style>
</head>

<body class="stagger-1">

    <div class="main-content">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h1 style="margin-bottom:var(--space-1);">My Submissions</h1>
                <p class="text-secondary" style="font-size:var(--text-sm); margin:0;">Track your waste collection
                    requests</p>
            </div>
            <a href="submit-waste.html" class="btn gradient-brand"
                style="padding: 8px 16px; font-size:var(--text-sm);">+ New</a>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="scheduled">Scheduled</button>
            <button class="filter-btn" data-filter="collected">Collected</button>
        </div>

        <div id="submissionsContainer" class="card-grid-2">
            <!-- Skeleton cards injected via JS -->
        </div>
    </div>

    <!-- Global Layout Injector -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>

    <script>
        let allSubmissions = [];
        let activeFilter = 'all';

        const getWasteEmoji = (category) => {
            const map = { 'biodegradable': '🌱', 'recyclable': '♻️', 'non-biodegradable': '🗑️', 'hazardous': '⚠️', 'special': '🛋️', 'mixed': '📦' };
            return map[category?.toLowerCase()] || '📦';
        };

        const renderTags = (tagsStr, type) => {
            if (!tagsStr) return '';
            let tags = [];
            try { tags = typeof tagsStr === 'string' ? JSON.parse(tagsStr) : tagsStr; } catch (e) { }
            if (!Array.isArray(tags)) tags = [tagsStr];

            return tags.filter(t => t).map(t =>
                `<span style="display:inline-block; padding:2px 8px; border-radius:12px; font-size:10px; background:var(--bg-inset); color:var(--text-secondary); margin-right:4px;">${t}</span>`
            ).join('');
        };

        const formatDate = (dateString, includeTime = false) => {
            if (!dateString) return 'N/A';
            const d = new Date(dateString);
            const opts = { month: 'short', day: 'numeric', year: 'numeric' };
            if (includeTime) { opts.hour = 'numeric'; opts.minute = '2-digit'; }
            return d.toLocaleDateString('en-US', opts);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.role !== 'resident' && user.role !== 'admin') { window.location.href = 'login.html'; return; }

            setupFilters();
            await loadSubmissions();
        });

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    activeFilter = e.target.dataset.filter;
                    applyFilter();
                });
            });
        }

        async function loadSubmissions() {
            const container = document.getElementById('submissionsContainer');
            showSkeletonList(container, 4, 'card');

            try {
                const res = await apiFetch('/api/waste/my-submissions');
                allSubmissions = res.data || [];
                applyFilter();
            } catch (error) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align:center; padding:var(--space-6);">
                        <img src="../assets/mascot4.png" alt="Error" class="mascot mascot-sm mb-3">
                        <div class="text-secondary">Failed to load submissions.</div>
                    </div>
                `;
            }
        }

        function applyFilter() {
            const filtered = activeFilter === 'all'
                ? allSubmissions
                : allSubmissions.filter(s => (s.collection_status || 'pending').toLowerCase() === activeFilter);

            renderSubmissions(filtered);
        }

        function renderSubmissions(submissions) {
            const container = document.getElementById('submissionsContainer');

            if (submissions.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align:center; padding:var(--space-6);">
                        <img src="../assets/mascot2.png" alt="Empty" class="mascot mascot-sm mb-3" style="opacity:0.6;">
                        <h3 style="margin-bottom:var(--space-2);">No submissions found</h3>
                        <p class="text-secondary" style="font-size:var(--text-sm);">
                            ${activeFilter === 'all' ? 'You haven\'t made any requests yet.' : `Zero requests in '${activeFilter}' state.`}
                        </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = submissions.map(sub => {
                const status = (sub.collection_status || 'pending').toLowerCase();
                const canCancel = status === 'pending';

                const imageHtml = sub.image_path
                    ? `<div style="height:140px; border-radius:var(--radius-md) var(--radius-md) 0 0; overflow:hidden; background:#000;">
                           <img src="${sub.image_path}" style="width:100%; height:100%; object-fit:cover; opacity:0.8;">
                       </div>`
                    : `<div style="height:140px; background:var(--bg-inset); border-radius:var(--radius-md) var(--radius-md) 0 0; display:flex; align-items:center; justify-content:center; color:var(--text-muted);">No Image</div>`;

                const mainCat = sub.category_name || sub.confirmed_category || sub.predicted_category || 'mixed';
                const emoji = getWasteEmoji(mainCat);
                const confidenceHtml = sub.confidence_score ? `<span style="font-size:10px; color:var(--brand-emerald);">🤖 ${Math.round(sub.confidence_score)}% match</span>` : '';

                return `
                    <div class="nm-raised custom-radius" style="padding:0; overflow:hidden; display:flex; flex-direction:column;">
                        ${imageHtml}
                        
                        <div style="padding:var(--space-4); flex:1; display:flex; flex-direction:column;">
                            <div class="d-flex align-items-start justify-content-between mb-2">
                                <div class="badge badge-${status}" style="margin-bottom:0;">${status.charAt(0).toUpperCase() + status.slice(1)}</div>
                                <div class="text-muted" style="font-size:10px;">ID: #${sub.submission_id}</div>
                            </div>
                            
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <span style="font-size:20px;">${emoji}</span>
                                <div>
                                    <div style="font-weight:700; font-size:var(--text-md);">${mainCat.toUpperCase()}</div>
                                    ${confidenceHtml}
                                </div>
                            </div>

                            <div style="margin-bottom:var(--space-3);">
                                <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">PROPERTIES</div>
                                <div>${renderTags(sub.waste_adjectives) || renderTags(sub.waste_types)}</div>
                            </div>

                            <div style="margin-bottom:var(--space-3); font-size:12px; color:var(--text-secondary);">
                                <div style="display:flex; gap:8px; margin-bottom:4px;">
                                    <span>📍</span> <span class="text-truncate">${sub.address_description || sub.barangay_name || 'No address'}</span>
                                </div>
                                <div style="display:flex; gap:8px;">
                                    <span>📅</span> <span>${formatDate(sub.created_at)}</span>
                                </div>
                            </div>

                            ${sub.waste_description ? `
                            <div class="nm-inset" style="padding:var(--space-2); font-size:11px; color:var(--text-secondary); margin-bottom:var(--space-3); max-height:60px; overflow-y:auto;">
                                "${sub.waste_description}"
                            </div>` : '<div style="flex:1;"></div>'}

                            <div class="mt-auto pt-3" style="border-top:1px solid rgba(255,255,255,0.05); display:flex; justify-content:flex-end;">
                                ${canCancel ? `<button class="btn-cancel" onclick="cancelSubmission(${sub.submission_id})">Cancel</button>` : `<span style="font-size:11px; color:var(--text-muted);">No actions available</span>`}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.cancelSubmission = async function (id) {
            // Using utils.js alert override logic implicitly if confirm not overridden, but stick to standard confirm for speed/safety if needed, or implement a custom modal. 
            // We'll use standard confirm for deletion safety unless a custom modal is built.
            const confirmed = await showConfirmToast('Cancel Submission?', 'Are you sure you want to cancel this pending submission?');
            if (!confirmed) return;

            try {
                const res = await apiFetch(`/api/waste/${id}`, { method: 'DELETE' });
                if (res.status === 'success') {
                    showToast('Submission cancelled', 'success');
                    loadSubmissions();
                }
            } catch (e) {
                // error handled globally
            }
        };
    </script>
</body>

</html>
