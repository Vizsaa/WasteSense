<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .notif-card {
            display: flex;
            gap: var(--space-4);
            padding: var(--space-4);
            margin-bottom: var(--space-3);
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            position: relative;
        }

        .notif-card.unread {
            border-left-color: var(--brand-lime);
            background: rgba(110, 224, 0, 0.05);
        }

        .notif-icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: var(--shadow-raised);
        }

        .notif-card.unread .notif-icon-circle {
            background: var(--brand-lime);
            color: var(--bg-base);
        }

        .notif-content {
            flex: 1;
            min-width: 0;
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-1);
        }

        .notif-time {
            font-size: var(--text-xs);
            color: var(--text-muted);
            white-space: nowrap;
            margin-left: var(--space-3);
        }

        .notif-title {
            font-weight: 700;
            font-size: var(--text-sm);
            color: var(--text-primary);
            margin-bottom: var(--space-1);
            text-transform: capitalize;
        }

        .notif-message {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            padding: var(--space-8) var(--space-4);
        }
    </style>
</head>

<body class="stagger-1">

    <div class="main-content">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h1 style="margin-bottom:var(--space-1);">Notifications</h1>
                <p class="text-secondary" style="font-size:var(--text-sm); margin:0;">Alerts and collection reminders
                </p>
            </div>

            <button class="btn btn-ghost" onclick="markAllRead()" style="font-size:var(--text-xs); padding:6px 12px;">
                ✓ Mark all read
            </button>
        </div>

        <div id="notificationsContainer">
            <!-- Loading Skeletons via JS -->
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>
    <script>
        // Use a Set to track reading state locally for fast UI updates without full refetch immediately
        let markingInProgress = new Set();

        const getNotifIcon = (type) => {
            const map = {
                'reminder': '📅',
                'status_update': '🔔',
                'system': '⚙️',
                'welcome': '🎉'
            };
            return map[type] || '🔔';
        };

        const timeAgo = (dateStr) => {
            const d = new Date(dateStr);
            const now = new Date();
            const diffInSeconds = Math.floor((now - d) / 1000);

            if (diffInSeconds < 60) return 'Just now';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m ago`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h ago`;
            if (diffInSeconds < 604800) return `${Math.floor(diffInSeconds / 86400)}d ago`;
            return d.toLocaleDateString();
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user) { window.location.href = 'login.html'; return; }
            await loadNotifications();
        });

        async function loadNotifications() {
            const c = document.getElementById('notificationsContainer');
            showSkeletonList(c, 5, 'row');

            try {
                const res = await apiFetch('/api/notifications?limit=30');
                const items = res.data || [];

                if (items.length === 0) {
                    c.innerHTML = `
                        <div class="empty-state">
                            <img src="../assets/mascot3.png" class="mascot mascot-sm mb-3">
                            <h3 style="margin-bottom:4px;">All caught up!</h3>
                            <p class="text-muted text-sm">You have no new notifications right now.</p>
                        </div>
                    `;
                    return;
                }

                c.innerHTML = items.map(n => renderNotification(n)).join('');
            } catch (e) {
                c.innerHTML = `
                    <div class="empty-state">
                        <img src="../assets/mascot4.png" class="mascot mascot-sm mb-3">
                        <p class="text-muted">Failed to load notifications.</p>
                    </div>
                `;
            }

            // Re-bind sidebar bell count if it exists in the shell
            if (window.updateNotificationCount) window.updateNotificationCount();
        }

        function renderNotification(n) {
            const isRead = n.is_read || markingInProgress.has(n.notification_id);
            const icon = getNotifIcon(n.notification_type);
            const typeLabel = (n.notification_type || 'Notification').replace('_', ' ');
            const cardClass = isRead ? 'nm-flat' : 'nm-raised unread';

            // We'll auto mark as read when clicked
            return `
                <div class="notif-card ${cardClass}" onclick="handleNotifClick(${n.notification_id}, ${isRead}, this)">
                    <div class="notif-icon-circle">${icon}</div>
                    <div class="notif-content">
                        <div class="notif-header">
                            <div class="notif-title">${typeLabel}</div>
                            <div class="notif-time">${timeAgo(n.sent_at)}</div>
                        </div>
                        <div class="notif-message">${n.message}</div>
                    </div>
                </div>
            `;
        }

        async function handleNotifClick(id, alreadyRead, el) {
            if (alreadyRead) return;

            // Optimistic UI update
            markingInProgress.add(id);
            el.classList.remove('nm-raised', 'unread');
            el.classList.add('nm-flat');
            const iconCircle = el.querySelector('.notif-icon-circle');
            if (iconCircle) {
                iconCircle.style.background = 'var(--bg-surface)';
                iconCircle.style.color = 'var(--text-primary)';
            }

            // Background network call
            try {
                await apiFetch(`/api/notifications/${id}/read`, { method: 'POST' });
                if (window.updateNotificationCount) window.updateNotificationCount();
            } catch (e) { }
        }

        async function markAllRead() {
            const unreadCards = document.querySelectorAll('.notif-card.unread');
            if (unreadCards.length === 0) return;

            unreadCards.forEach(el => {
                el.classList.remove('nm-raised', 'unread');
                el.classList.add('nm-flat');
                const ic = el.querySelector('.notif-icon-circle');
                if (ic) { ic.style.background = 'var(--bg-surface)'; ic.style.color = ''; }
            });

            try {
                // Fetch all remaining unread and mark loop if a bulk endpoint isn't available
                // Based on API, there isn't a specific mark-all, so we'll fetch unread and map over them, or we can just reload after a bit.
                const res = await apiFetch('/api/notifications?limit=50');
                const unreadIds = (res.data || []).filter(n => !n.is_read).map(n => n.notification_id);

                await Promise.all(unreadIds.map(id => apiFetch(`/api/notifications/${id}/read`, { method: 'POST' })));

                showToast('All caught up!', 'success');
                if (window.updateNotificationCount) window.updateNotificationCount();
            } catch (e) { }
        }
    </script>
</body>

</html>
