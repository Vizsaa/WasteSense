<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - WasteSense</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin-bottom: var(--space-5);
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            background: var(--bg-inset);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--brand-lime);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(110, 224, 0, 0.3);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-pill);
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 8px;
        }

        .auth-card {
            background: var(--bg-raised);
            padding: var(--space-6);
            border-radius: var(--radius-lg);
            max-width: 600px;
            margin: 0 auto;
            border-top: 2px solid var(--brand-lime);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="stagger-1">

    <div class="main-content">
        <!-- Header -->
        <div class="d-flex align-items-center justify-content-between mb-5">
            <div>
                <a href="#" id="dashboardLink" class="text-secondary text-sm mb-2"
                    style="display:inline-block; text-decoration:none;">← Back to Dashboard</a>
                <h1 style="margin:0; font-size:var(--text-2xl);">My Profile</h1>
                <p class="text-secondary mt-1">Manage your account identity and contact preferences.</p>
            </div>
        </div>

        <div class="auth-card nm-raised">
            <div class="profile-header">
                <div class="profile-avatar" id="avatar">
                    <span id="avatarInitials">..</span>
                </div>
                <div>
                    <h2 id="profileName" style="margin:0; font-size:var(--text-xl);">Loading...</h2>
                    <p id="profileEmail" class="text-secondary" style="margin:4px 0 0;"></p>
                    <div id="profileRole" class="role-badge"></div>
                </div>
            </div>

            <form id="profileForm">
                <div class="form-row mb-4">
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" class="input-light" placeholder="Jane Doe">
                    </div>
                    <div class="form-group">
                        <label for="phone_number">Phone Number</label>
                        <input type="text" id="phone_number" name="phone_number" class="input-light"
                            placeholder="+63 900 000 0000">
                    </div>
                </div>

                <div class="form-group mb-5">
                    <label for="address">Primary Address</label>
                    <textarea id="address" name="address" class="input-light" rows="3"
                        placeholder="Enter your full street address"></textarea>
                </div>

                <button type="submit" class="btn gradient-brand text-dark w-100" id="saveBtn">Update Profile</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthStatus();
            if (!user) { window.location.href = 'login.html'; return; }

            // Set dashboard link based on role
            const dashLink = document.getElementById('dashboardLink');
            if (user.role === 'admin') dashLink.href = 'dashboard-admin.html';
            else if (user.role === 'collector') dashLink.href = 'dashboard-collector.html';
            else dashLink.href = 'dashboard-resident.html';

            await loadProfile();
        });

        async function loadProfile() {
            try {
                const res = await apiFetch('/api/users/profile');
                const user = res.data;

                document.getElementById('profileName').textContent = user.full_name || 'Anonymous User';
                document.getElementById('profileEmail').textContent = user.email || 'No email attached';
                document.getElementById('profileRole').textContent = String(user.role).toUpperCase();

                // Color code role badge
                const rb = document.getElementById('profileRole');
                if (user.role === 'admin') rb.style.color = 'var(--brand-lime)';
                if (user.role === 'collector') rb.style.color = 'var(--brand-emerald)';
                if (user.role === 'resident') rb.style.color = 'var(--brand-blue)';

                document.getElementById('full_name').value = user.full_name || '';
                document.getElementById('phone_number').value = user.phone_number || '';
                document.getElementById('address').value = user.address || '';

                const initials = (user.full_name || user.email || 'U').split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
                document.getElementById('avatarInitials').textContent = initials;

                if (user.profile_picture) {
                    document.getElementById('avatar').innerHTML = `<img src="${user.profile_picture}" alt="Avatar">`;
                }
            } catch (error) {
                showToast('Failed to sync profile data from server.', 'error');
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = 'Saving...';

            const body = {
                full_name: document.getElementById('full_name').value.trim(),
                phone_number: document.getElementById('phone_number').value.trim(),
                address: document.getElementById('address').value.trim()
            };

            try {
                const res = await apiFetch('/api/users/update-profile', { method: 'PUT', body: JSON.stringify(body) });
                if (res.status === 'success') {
                    showToast('Profile updated successfully', 'success');
                    await loadProfile();
                }
            } catch (error) {
                // apiFetch handles toasts
            } finally {
                btn.disabled = false; btn.textContent = 'Update Profile';
            }
        });
    </script>
</body>

</html>
